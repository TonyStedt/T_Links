<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linker - Premium URL Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="app-container">
        <header class="header">
            <div class="logo">
                <i data-feather="link-2"></i>
                <h1>Synapsis</h1>
            </div>
            <div class="header-actions">
                <button id="exportBtn" class="secondary-btn" title="Export to JSON">
                    <i data-feather="download"></i>
                </button>
                <button id="importBtn" class="secondary-btn" title="Import from JSON">
                    <i data-feather="upload"></i>
                </button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
                <button id="addBtn" class="primary-btn">
                    <i data-feather="plus"></i> <span>Add URL</span>
                </button>
            </div>
        </header>

        <section class="filters-container">
            <div class="filters" id="categoryFilters">
                <!-- Filters injected via JS -->
            </div>
        </section>

        <main class="grid" id="linksGrid">
            <!-- Cards injected via JS -->
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add New URL</h2>
                <button class="close-btn" id="closeModalBtn"><i data-feather="x"></i></button>
            </div>
            <form id="linkForm" class="form">
                <input type="hidden" id="linkId">
                
                <div class="form-group">
                    <label for="linkName">Name</label>
                    <input type="text" id="linkName" required placeholder="e.g., GitHub" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label for="linkUrl">URL</label>
                    <input type="url" id="linkUrl" required placeholder="https://github.com" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label for="linkDesc">Description</label>
                    <textarea id="linkDesc" rows="3" placeholder="A short description of this resource..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="linkCategory">Category</label>
                    <input type="text" id="linkCategory" required placeholder="e.g., Development, Design" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>Icon</label>
                    <div class="icon-selector" id="iconSelector">
                        <!-- Icons injected via JS -->
                    </div>
                    <input type="hidden" id="linkIcon" required>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="secondary-btn" id="cancelBtn">Cancel</button>
                    <button type="submit" class="primary-btn submit-btn">Save Entry</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
